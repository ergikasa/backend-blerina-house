spring:
  application:
    name: blerina-house-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 8MB
      max-request-size: 45MB

booking:
  hold-minutes: 15

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never

logging:
  level:
    root: INFO
    com.blerinahouse: DEBUG

Cloudinary:
  url: ${CLOUDINARY_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5175}

stripe:
  secret-key: ${STRIPE_SECRET_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}